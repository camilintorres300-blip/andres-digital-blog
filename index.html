<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog Digital de Andrés</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
scroll-behavior:smooth;
}

body{
background:#0d1117;
color:white;
}

header{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0d1117,#1f2937);
animation:fondo 8s infinite alternate;
}

@keyframes fondo{
0%{background:#0d1117;}
100%{background:#111827;}
}

h1{
font-size:60px;
animation:aparecer 2s;
}

p{
margin-top:20px;
font-size:22px;
color:#d1d5db;
animation:aparecer 3s;
}

@keyframes aparecer{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}

a{
margin-top:40px;
padding:15px 40px;
background:#3b82f6;
color:white;
text-decoration:none;
border-radius:40px;
transition:.4s;
}

a:hover{
transform:scale(1.1);
background:#2563eb;
}

section{
padding:80px;
}

.tarjetas{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
margin-top:40px;
}

.card{
background:#161b22;
padding:30px;
border-radius:20px;
transition:.4s;
}

.card:hover{
transform:translateY(-15px);
}

footer{
text-align:center;
padding:30px;
background:#161b22;
}

</style>

</head>

<body>

<header>

<h1>Blog Digital de Andrés</h1>

<p>Mi vida, mis ideas y mi región.</p>

<a href="#contenido">Explorar</a>

</header>

<section id="contenido">

<h2>Bienvenido</h2>

<div class="tarjetas">

<div class="card">
<h3>Videojuegos</h3>
<p>Noticias, análisis y curiosidades.</p>
</div>

<div class="card">
<h3>Tecnología</h3>
<p>Herramientas digitales e inteligencia artificial.</p>
</div>

<div class="card">
<h3>Paipa Boyacá</h3>
<p>Lugares, turismo y cultura.</p>
</div>

</div>

</section>

<footer>

© 2026 Blog Digital de Andrés

</footer>

</body>
</html>
primer diseño del blog
