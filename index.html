<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Andrés' Digital Blog</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{

background:linear-gradient(135deg,#3b82f6,#60a5fa);

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;
padding:40px;

}

.container{

width:95%;
max-width:1400px;

background:white;

border-radius:20px;

padding:30px;

box-shadow:0 20px 50px rgba(0,0,0,.25);

}

h1{

text-align:center;

font-size:45px;

color:#1e3a8a;

margin-bottom:10px;

}

.subtitle{

text-align:center;

margin-bottom:30px;

font-size:20px;

color:#555;

}

.imageContainer{

position:relative;

}

.imageContainer img{

width:100%;

border-radius:15px;

display:block;

}

.hotspot{

position:absolute;

cursor:pointer;

border-radius:10px;

transition:.3s;

}

.hotspot:hover{

background:rgba(0,140,255,.25);

transform:scale(1.03);

}

#modal{

position:fixed;

left:0;

top:0;

width:100%;

height:100%;

background:rgba(0,0,0,.8);

display:none;

justify-content:center;

align-items:center;

padding:30px;

z-index:999;

}

.modalBox{

background:white;

width:90%;

max-width:900px;

border-radius:20px;

padding:30px;

animation:zoom .3s;

}

@keyframes zoom{

from{

transform:scale(.8);

opacity:0;

}

to{

transform:scale(1);

opacity:1;

}

}

.modalBox h2{

font-size:35px;

color:#2563eb;

margin-bottom:20px;

}

.modalBox p{

font-size:20px;

line-height:1.8;

color:#333;

}

button{

margin-top:25px;

padding:12px 30px;

background:#2563eb;

border:none;

border-radius:10px;

color:white;

font-size:18px;

cursor:pointer;

}

button:hover{

background:#1d4ed8;

}

</style>

</head>

<body>

<div class="container">

<h1>Andrés' Digital Blog</h1>

<div class="subtitle">
Click on any section of the image.
</div>

<div class="imageContainer">

<img src="blog.jpg">

<div class="hotspot" style="left:0%;top:0%;width:33%;height:33%;" onclick="show(1)"></div>

<div class="hotspot" style="left:33%;top:0%;width:34%;height:33%;" onclick="show(2)"></div>

<div class="hotspot" style="left:67%;top:0%;width:33%;height:33%;" onclick="show(3)"></div>

<div class="hotspot" style="left:0%;top:33%;width:33%;height:33%;" onclick="show(4)"></div>

<div class="hotspot" style="left:33%;top:33%;width:34%;height:33%;" onclick="show(5)"></div>

<div class="hotspot" style="left:67%;top:33%;width:33%;height:33%;" onclick="show(6)"></div>

<div class="hotspot" style="left:0%;top:66%;width:33%;height:34%;" onclick="show(7)"></div>

<div class="hotspot" style="left:33%;top:66%;width:34%;height:34%;" onclick="show(8)"></div>

<div class="hotspot" style="left:67%;top:66%;width:33%;height:34%;" onclick="show(9)"></div>

</div>

</div>

<div id="modal">

<div class="modalBox">

<h2 id="title"></h2>

<p id="text"></p>

<button onclick="closeModal()">Close</button>

</div>

</div>

<script>

const info={

1:{
title:"Andrés' Digital Blog",
text:"This blog is about my life, my ideas and the beautiful place where I live. Here I share my hobbies, interests, family, region and personal goals."
},

2:{
title:"My Family",
text:"My family is very important to me. They always support me and encourage me to achieve my goals. We enjoy spending time together and celebrating special occasions."
},

3:{
title:"My Hobbies",
text:"My favorite hobbies are playing video games, editing videos and drawing. These activities help me relax, improve my creativity and develop new skills."
},

4:{
title:"My Interests",
text:"I am interested in digital animation, technology, video editing, design and fitness. I enjoy learning new software and improving my English every day."
},

5:{
title:"Tourist Place",
text:"Lago Sochagota is one of the most beautiful places in Paipa, Boyacá, Colombia. Visitors can walk around the lake, ride bicycles and enjoy nature."
},

6:{
title:"Current News",
text:"Protecting the environment is everyone's responsibility. Recycling, saving water and planting trees are simple actions that help our planet."
},

7:{
title:"Critical Thinking",
text:"Critical thinking helps us analyze information before believing or sharing it. Media literacy allows us to identify reliable sources and make better decisions."
},

8:{
title:"Crime and Punishment",
text:"Crime affects society and punishment seeks justice, correction and prevention. Education and opportunities help reduce crime."
},

9:{
title:"Thank You",
text:"Thank you for reading my digital blog. I hope you enjoyed learning more about me, my hobbies and my region."
}

}

function show(id){

document.getElementById("modal").style.display="flex";

document.getElementById("title").innerHTML=info[id].title;

document.getElementById("text").innerHTML=info[id].text;

}

function closeModal(){

document.getElementById("modal").style.display="none";

}

</script>

</body>

</html>
